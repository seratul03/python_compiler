<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PyFlux</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='Favicon.ico') }}">

</head>

<body>

    <div class="app-container">

        <header class="app-header">

            <h2>PyFlux</h2>

            <div style="display:flex; gap:10px;">

                <button type="button" class="run-btn" onclick="runCode()">
                    Run Code
                </button>

                <button type="button" class="run-btn" style="background:#64748B;" onclick="resetCompiler()">
                    Reset
                </button>

            </div>

        </header>

        <div class="workspace">

            <div class="editor-pane">
                <div id="editor"></div>
            </div>

            <div class="output-pane">

                <div class="tab-bar">

                    <button class="tab-btn active" onclick="switchTab('output')">
                        Output
                    </button>

                    <button class="tab-btn" onclick="switchTab('ast')">
                        AST
                    </button>

                    <button class="tab-btn" onclick="switchTab('cfg')">
                        CFG
                    </button>

                    <button class="tab-btn" onclick="switchTab('bytecode')">
                        Bytecode
                    </button>

                </div>

                <div id="output" class="tab-content active"></div>

                <div id="ast" class="tab-content"></div>

                <div id="cfg" class="tab-content"></div>

                <div id="bytecode" class="tab-content"></div>

                <div id="input-row">

                    <input type="text" id="user-input-field" placeholder="Enter input..."
                        onkeydown="if(event.key==='Enter') submitInput()" />

                    <button onclick="submitInput()">
                        Send
                    </button>

                </div>

            </div>
        </div>
    </div>
    <div id="editor-menu">
    <div class="menu-item" onclick="menuCut()">Cut</div>
    <div class="menu-item" onclick="menuCopy()">Copy</div>
    <div class="menu-item" onclick="menuPaste()">Paste</div>
</div>
    <script src="https://unpkg.com/monaco-editor@latest/min/vs/loader.js"></script>

    <script>

        require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@latest/min/vs' } });

        require(["vs/editor/editor.main"], function () {

            monaco.editor.defineTheme("formal-light", {

                base: "vs",
                inherit: true,

                rules: [

                    { token: "comment", foreground: "16A34A", fontStyle: "italic" },
                    { token: "keyword", foreground: "4338CA" },
                    { token: "string", foreground: "B91C1C" },
                    { token: "number", foreground: "059669" },
                    { token: "identifier", foreground: "0F172A" }

                ],

                colors: {
                    "editor.background": "#FFFFFF",
                    "editor.lineHighlightBackground": "#F3F6FB",
                    "editorCursor.foreground": "#0B1220",
                    "editor.selectionBackground": "#DCE7FF",
                    "editorLineNumber.foreground": "#9AA4B2",
                    "editorLineNumber.activeForeground": "#0F172A",
                    "editorSuggestWidget.background": "#ACE4D4",
                    "editorSuggestWidget.border": "#CBD5E1",
                    "editorSuggestWidget.foreground": "#0B1220",
                    "editorSuggestWidget.selectedBackground": "#456990",
                    "editorSuggestWidget.highlightForeground": "#2563EB",
                    "editorHoverWidget.background": "#FFFFFF",
                    "editorHoverWidget.border": "#CBD5E1",
                    "editorWidget.background": "#FFFFFF",
                    "editorWidget.border": "#CBD5E1"
                }

            });

            window.editor = monaco.editor.create(document.getElementById("editor"), {

                value: `print("Hello Brainware")`,
                language: "python",
                theme: "formal-light",

                automaticLayout: true,

                fontSize: 15,
                fontFamily: "'Fira Code', Consolas, monospace",
                fontLigatures: true,
                contextmenu: false,

                cursorBlinking: "smooth",
                cursorStyle: "line",

                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                wordWrap: "on",

                padding: { top: 16, bottom: 16 }

            });

            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyMod.Shift | monaco.KeyCode.KeyP, function () { });

            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyP, function () { });

            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, function () {

                if (typeof runCode === 'function') {
                    runCode();
                }

            });

        });

    </script>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
